name: Build & deploy app images

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'

permissions:
  contents: write
  packages: write

jobs:
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changed.outputs.apps }}
      any: ${{ steps.changed.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changed
        name: List apps with changed source
        run: |
          set -euo pipefail
          # Only include apps whose directory still exists (skip deletions)
          changed=$(git diff --name-only HEAD^ HEAD -- 'apps/' \
            | awk -F/ 'NF>=2 {print $2}' \
            | sort -u \
            | while read -r app; do [[ -d "apps/$app" ]] && echo "$app"; done)
          if [[ -z "$changed" ]]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "apps=[]" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "apps=$(echo "$changed" | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed apps:"
          echo "$changed"

  build:
    name: Build ${{ matrix.app }}
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.5.4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image with buildpacks
        env:
          APP: ${{ matrix.app }}
        run: |
          set -euo pipefail
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/${APP}:${{ github.sha }}"
          echo "Building ${IMAGE} from apps/${APP}/"
          pack build "${IMAGE}" \
            --path "apps/${APP}" \
            --builder paketobuildpacks/builder-jammy-base \
            --publish
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Create or update manifest
        env:
          APP: ${{ matrix.app }}
        run: |
          set -euo pipefail
          MANIFEST_DIR="argocd/manifests/${APP}"
          MANIFEST="${MANIFEST_DIR}/deployment.yaml"
          DESCRIPTOR="apps/${APP}/bcp-xpress.yaml"

          mkdir -p "$MANIFEST_DIR"

          if [[ ! -f "$MANIFEST" ]]; then
            echo "📝 Manifest not found — creating from ${DESCRIPTOR}"

            if [[ -f "$DESCRIPTOR" ]]; then
              NAME=$(yq '.name // env(APP)' "$DESCRIPTOR")
              PORT=$(yq '.port // 8080' "$DESCRIPTOR")
              REPLICAS=$(yq '.replicas.min // 1' "$DESCRIPTOR")
              ITSI=$(yq '.itsi // "unknown"' "$DESCRIPTOR")
            else
              NAME="${APP}"
              PORT=8080
              REPLICAS=1
              ITSI="unknown"
            fi

            # Build deployment.yaml using yq (no heredoc)
            yq -n '
              .apiVersion = "apps/v1" |
              .kind = "Deployment" |
              .metadata.name = strenv(NAME) |
              .metadata.labels.app = strenv(NAME) |
              .metadata.labels["bcpxpress.yourco.io/itsi"] = strenv(ITSI) |
              .spec.replicas = env(REPLICAS) |
              .spec.selector.matchLabels.app = strenv(NAME) |
              .spec.template.metadata.labels.app = strenv(NAME) |
              .spec.template.spec.containers[0].name = strenv(NAME) |
              .spec.template.spec.containers[0].image = strenv(IMAGE) |
              .spec.template.spec.containers[0].ports[0].containerPort = env(PORT)
            ' > "$MANIFEST"

            # Append env vars from descriptor
            if [[ -f "$DESCRIPTOR" ]]; then
              ENV_COUNT=$(yq '.env | length // 0' "$DESCRIPTOR")
              if [[ "$ENV_COUNT" -gt 0 ]]; then
                yq -i '.spec.template.spec.containers[0].env = []' "$MANIFEST"
                for ((i=0; i<ENV_COUNT; i++)); do
                  KEY=$(yq ".env[$i].name" "$DESCRIPTOR")
                  VAL=$(yq ".env[$i].value" "$DESCRIPTOR")
                  export KEY VAL
                  yq -i '.spec.template.spec.containers[0].env += [{"name": strenv(KEY), "value": strenv(VAL)}]' "$MANIFEST"
                done
              fi
            fi

            # Build service.yaml using yq (no heredoc)
            yq -n '
              .apiVersion = "v1" |
              .kind = "Service" |
              .metadata.name = strenv(NAME) |
              .metadata.labels.app = strenv(NAME) |
              .spec.selector.app = strenv(NAME) |
              .spec.ports[0].port = 80 |
              .spec.ports[0].targetPort = env(PORT)
            ' > "${MANIFEST_DIR}/service.yaml"

            echo "✅ Manifests created"
          else
            echo "📝 Updating image tag in existing manifest"
            yq -i ".spec.template.spec.containers[0].image = strenv(IMAGE)" "$MANIFEST"
          fi

          echo "Image: ${IMAGE}"

      - name: Commit updated manifest
        env:
          APP: ${{ matrix.app }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "argocd/manifests/${APP}/"
          if git diff --cached --quiet; then
            echo "No manifest changes"
            exit 0
          fi
          git commit -m "ci(${APP}): update image to ${IMAGE} [skip ci]"
          git push
