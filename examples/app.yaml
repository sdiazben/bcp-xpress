# app.yaml — the ONLY file developers maintain.
# For the POC we use a container image directly.
# In production, developers provide a JAR/binary and
# the platform builds the image via kpack/CNB.

name: my-service
itsi: ITSI-12345                  # mandatory governance ID

image: docker.io/kennethreitz/httpbin   # POC: pre-built image
port: 80

replicas:
  min: 1
  max: 3

env:
  - name: LOG_LEVEL
    value: info
